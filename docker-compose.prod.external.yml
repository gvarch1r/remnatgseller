# Тома: name: remnashop-* — совместимость с уже созданными volume на сервере (данные не теряются).
# Новая установка: можно заменить на remnatgseller-db-data / remnatgseller-redis-data.

x-build: &build
  image: ghcr.io/gvarch1r/remnatgseller:latest

  volumes:
      - ./logs:/opt/remnatgseller/logs
      - ./assets:/opt/remnatgseller/assets

x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576

  restart: unless-stopped

  networks:
    - remnawave-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env


services:
  remnatgseller-db:
    image: postgres:17
    container_name: "remnatgseller-db"
    hostname: remnatgseller-db
    <<: [*common, *logging, *env]

    environment:
      - POSTGRES_USER=${DATABASE_USER:-remnatgseller}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME:-remnatgseller}
      - TZ=UTC

    ports:
      - 127.0.0.1:5001:${DATABASE_PORT:-5432}

    volumes:
      - remnatgseller-db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USER:-remnatgseller} -d $${DATABASE_NAME:-remnatgseller}"]
      interval: 3s
      timeout: 10s
      retries: 3


  remnatgseller-redis:
    image: valkey/valkey:9-alpine
    container_name: "remnatgseller-redis"
    hostname: remnatgseller-redis
    <<: [*common, *logging, *env]

    command: >
      sh -c '
      ARGS="--save \"\" --appendonly no --maxmemory-policy noeviction --loglevel warning";
      if [ -n "$${REDIS_PASSWORD}" ]; then
        exec valkey-server $${ARGS} --requirepass "$${REDIS_PASSWORD}";
      else
        exec valkey-server $${ARGS};
      fi'

    volumes:
      - remnatgseller-redis-data:/data

    healthcheck:
      test: ["CMD-SHELL", "valkey-cli $${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep PONG"]
      interval: 3s
      timeout: 10s
      retries: 3


  remnatgseller:
    container_name: "remnatgseller"
    hostname: remnatgseller
    <<: [*build, *common, *logging, *env]

    environment:
      RESET_ASSETS: "${RESET_ASSETS:-false}"

    ports:
      - 127.0.0.1:5000:${APP_PORT:-5000}

    depends_on:
        remnatgseller-db:
          condition: service_healthy
        remnatgseller-redis:
          condition: service_healthy


  remnatgseller-taskiq-worker:
    container_name: "remnatgseller-taskiq-worker"
    hostname: remnatgseller-taskiq-worker
    <<: [*build, *common, *logging, *env]

    command: >
        taskiq worker src.infrastructure.taskiq.worker:worker
        --ack-type when_received --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd

    depends_on:
        remnatgseller-redis:
          condition: service_healthy
        remnatgseller-db:
          condition: service_healthy


  remnatgseller-taskiq-scheduler:
    container_name: "remnatgseller-taskiq-scheduler"
    hostname: remnatgseller-taskiq-scheduler
    <<: [*build, *common, *logging, *env]

    command: >
        taskiq scheduler src.infrastructure.taskiq.scheduler:scheduler
        --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd

    depends_on:
        remnatgseller-redis:
          condition: service_healthy
        remnatgseller-db:
          condition: service_healthy


networks:
  # Сеть часто уже создана Remnawave / старым стеком — не создаём заново.
  remnawave-network:
    name: remnawave-network
    external: true

volumes:
  remnatgseller-db-data:
    name: remnashop-db-data
    driver: local
    external: false

  remnatgseller-redis-data:
    name: remnashop-redis-data
    driver: local
    external: false
