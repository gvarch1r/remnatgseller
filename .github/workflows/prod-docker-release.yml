name: Remnatgseller - Release

on:
  # Сборка при каждом push в main (обновляет ghcr ...:latest — prod compose без build:)
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 🧾 Checkout (коммит тега / текущий SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔖 Get latest tag
        id: latest-tag
        uses: JinoArch/get-latest-tag@latest

      - name: 🏷️ Define Build Args
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            BUILD_BRANCH="${GITHUB_REF_NAME}"
            BUILD_TAG="${GITHUB_REF_NAME}"
          else
            VERSION_TAG="main-${SHORT_SHA}"
            BUILD_BRANCH="${GITHUB_REF_NAME}"
            BUILD_TAG="main"
          fi
          {
            echo "image_tag<<EOF"
            echo "${IMAGE_REPO}:latest"
            echo "${IMAGE_REPO}:${VERSION_TAG}"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "build_branch=${BUILD_BRANCH}" >> $GITHUB_OUTPUT
          echo "build_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Tags: latest ${VERSION_TAG}"
          echo "✅ SHA: ${SHORT_SHA}"

      - name: 🛠️ Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.image_tag }}
          build-args: |
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
            BUILD_BRANCH=${{ steps.vars.outputs.build_branch }}
            BUILD_COMMIT=${{ steps.vars.outputs.short_sha }}
            BUILD_TAG=${{ steps.vars.outputs.build_tag }}

      - name: 📦 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            # Remnatgseller ${{ github.ref_name }}
            [![GitHub](https://img.shields.io/badge/GitHub-repo-181717?style=social&logo=github)](https://github.com/${{ github.repository }})
            [![Releases](https://img.shields.io/badge/Releases-0969da?style=social&logo=github)](https://github.com/${{ github.repository }}/releases)

            ---

            - [Compare changes (${{ steps.latest-tag.outputs.previousTag }}...${{ steps.latest-tag.outputs.latestTag }})](https://github.com/${{ github.repository }}/compare/${{ steps.latest-tag.outputs.previousTag }}...${{ steps.latest-tag.outputs.latestTag }})

            ---

            ## 🐳 Docker Images

            ### Latest:
            ```
            ghcr.io/${{ github.repository }}:latest
            ```

            ### Versioned:
            ```
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          draft: false
          prerelease: false
